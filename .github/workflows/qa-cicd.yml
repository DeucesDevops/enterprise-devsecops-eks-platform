name: Enterprise DevSecOps CICD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - apps/frontend/**
      - services/**
      - infrastructure/**
      - kubernetes/**
      - scripts/**
      - package.json
      - .github/workflows/qa-cicd.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --report-format=json \
            --report-path=/repo/gitleaks-report.json \
            --redact \
            --exit-code 0

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

  checkov-terraform:
    name: Checkov Terraform Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Terraform scan
        run: |
          checkov -d . \
            --framework terraform \
            --output json > checkov-terraform-report.json || true

      - name: Upload Checkov Terraform report
        uses: actions/upload-artifact@v7
        with:
          name: checkov-terraform-report
          path: checkov-terraform-report.json
          if-no-files-found: warn

  checkov-k8s:
    name: Checkov Kubernetes Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Kubernetes scan
        run: |
          checkov -d . \
            --framework kubernetes \
            --output json > checkov-k8s-report.json || true

      - name: Upload Checkov Kubernetes report
        uses: actions/upload-artifact@v7
        with:
          name: checkov-k8s-report
          path: checkov-k8s-report.json
          if-no-files-found: warn

  checkov-dockerfile:
    name: Checkov Dockerfile Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Dockerfile scan
        run: |
          checkov -d . \
            --framework dockerfile \
            --output json > checkov-dockerfile-report.json || true

      - name: Upload Checkov Dockerfile report
        uses: actions/upload-artifact@v7
        with:
          name: checkov-dockerfile-report
          path: checkov-dockerfile-report.json
          if-no-files-found: warn

  client-trivy-fs:
    name: Client Trivy FS Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: latest
          cache: true

      - name: Verify Trivy installation
        run: |
          trivy --version
          which trivy

      - name: Run Trivy FS scan on client (JSON)
        run: |
          trivy fs ./apps/frontend \
            --format json \
            --output client-trivy-fs-report.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

      - name: Run Trivy FS scan on client (TABLE)
        run: |
          trivy fs ./apps/frontend \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 > client-trivy-fs-report.txt

      - name: Upload Client Trivy JSON report
        uses: actions/upload-artifact@v7
        with:
          name: client-trivy-fs-json-report
          path: client-trivy-fs-report.json
          if-no-files-found: warn

      - name: Upload Client Trivy TABLE report
        uses: actions/upload-artifact@v7
        with:
          name: client-trivy-fs-table-report
          path: client-trivy-fs-report.txt
          if-no-files-found: warn

  server-trivy-fs:
    name: Server Trivy FS Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: latest
          cache: true

      - name: Verify Trivy installation
        run: |
          trivy --version
          which trivy

      - name: Run Trivy FS scan on server (JSON)
        run: |
          trivy fs ./services \
            --format json \
            --output server-trivy-fs-report.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

      - name: Run Trivy FS scan on server (TABLE)
        run: |
          trivy fs ./services \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 > server-trivy-fs-report.txt

      - name: Upload Server Trivy JSON report
        uses: actions/upload-artifact@v7
        with:
          name: server-trivy-fs-json-report
          path: server-trivy-fs-report.json
          if-no-files-found: warn

      - name: Upload Server Trivy TABLE report
        uses: actions/upload-artifact@v7
        with:
          name: server-trivy-fs-table-report
          path: server-trivy-fs-report.txt
          if-no-files-found: warn

  client-lint:
    name: Client Lint
    runs-on: ubuntu-latest
    needs:
      - client-trivy-fs
      - checkov-k8s
      - checkov-dockerfile
      - checkov-terraform

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run client lint
        run: npm run lint:client

  server-lint:
    name: Server Lint
    runs-on: ubuntu-latest
    needs:
      - server-trivy-fs
      - checkov-k8s
      - checkov-dockerfile
      - checkov-terraform

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run server lint
        run: npm run lint:server

  client-test:
    name: Client Test
    runs-on: ubuntu-latest
    needs: client-lint

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run client tests
        run: npm run test:client

  server-test:
    name: Server Test
    runs-on: ubuntu-latest
    needs: server-lint

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run server tests
        run: npm run test:server

  sonarqube:
    name: SonarQube Analysis & Quality Gate Check
    runs-on: ubuntu-latest
    needs:
      - server-test
      - client-test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        id: sonarqube-quality-gate-check
        continue-on-error: true
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Show SonarQube Quality Gate Status value
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        run: echo "The Quality Gate status is ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"

      - name: Record skipped SonarQube analysis
        if: env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == ''
        run: |
          cat > sonarqube-skipped.txt <<'REPORT'
          SonarQube analysis was skipped because SONAR_TOKEN and SONAR_HOST_URL are not configured.
          REPORT

      - name: Upload SonarQube skip report
        if: env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == ''
        uses: actions/upload-artifact@v7
        with:
          name: sonarqube-skip-report
          path: sonarqube-skipped.txt
          if-no-files-found: warn

  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    needs:
      - client-test
      - sonarqube

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build client
        run: npm run build:client

      - name: Upload client build artifact
        uses: actions/upload-artifact@v7
        with:
          name: client-build
          path: dist/client
          if-no-files-found: error

  docker-build-scan-sbom:
    name: Docker Build, Scan & SBOM
    needs:
      - client-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: apps/frontend
          - service: user-service
            context: services/user-service
          - service: product-service
            context: services/product-service
          - service: order-service
            context: services/order-service
          - service: payment-service
            context: services/payment-service
          - service: notification-service
            context: services/notification-service

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Build image
        run: |
          docker build \
            -t "devsecops-commerce-${{ matrix.service }}:${{ github.sha }}" \
            "${{ matrix.context }}"

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: latest
          cache: true

      - name: Run Trivy image scan (JSON)
        run: |
          trivy image "devsecops-commerce-${{ matrix.service }}:${{ github.sha }}" \
            --format json \
            --output image-trivy-${{ matrix.service }}-report.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

      - name: Run Trivy image scan (TABLE)
        run: |
          trivy image "devsecops-commerce-${{ matrix.service }}:${{ github.sha }}" \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 > image-trivy-${{ matrix.service }}-report.txt

      - name: Generate image SBOM
        run: |
          trivy image "devsecops-commerce-${{ matrix.service }}:${{ github.sha }}" \
            --format spdx-json \
            --output image-sbom-${{ matrix.service }}.spdx.json

      - name: Upload Trivy image JSON report
        uses: actions/upload-artifact@v7
        with:
          name: image-trivy-${{ matrix.service }}-json-report
          path: image-trivy-${{ matrix.service }}-report.json
          if-no-files-found: warn

      - name: Upload Trivy image TABLE report
        uses: actions/upload-artifact@v7
        with:
          name: image-trivy-${{ matrix.service }}-table-report
          path: image-trivy-${{ matrix.service }}-report.txt
          if-no-files-found: warn

      - name: Upload image SBOM
        uses: actions/upload-artifact@v7
        with:
          name: image-sbom-${{ matrix.service }}
          path: image-sbom-${{ matrix.service }}.spdx.json
          if-no-files-found: error

  portfolio-readiness:
    name: Portfolio Delivery Readiness
    runs-on: ubuntu-latest
    needs:
      - docker-build-scan-sbom

    steps:
      - name: Record delivery note
        run: |
          cat > portfolio-delivery-readiness.md <<'REPORT'
          # Portfolio Delivery Readiness

          This public main pipeline demonstrates the DevSecOps quality flow:
          secret scanning, IaC scanning, filesystem scanning, linting, smoke
          testing, SonarQube readiness, Docker builds, image scanning, and SBOM
          generation.

          The private workbench pipeline performs the mutable delivery steps:
          GHCR push, QA manifest updates, and EKS deployment readiness.
          REPORT

      - name: Upload delivery readiness report
        uses: actions/upload-artifact@v7
        with:
          name: portfolio-delivery-readiness
          path: portfolio-delivery-readiness.md
