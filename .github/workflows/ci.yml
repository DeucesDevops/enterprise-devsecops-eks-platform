name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - qa

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate repository structure
        run: npm run lint
